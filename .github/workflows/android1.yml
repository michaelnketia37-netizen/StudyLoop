name: Build Debug APK

on:
  workflow_dispatch
  push:
    branches:
      - main
      - develop

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Remove Old Gradlew
        run: |
          rm -f ./gradlew ./gradlew.bat
          echo "✅ Old gradlew removed"

      - name: Regenerate Gradlew with Gradle 8.9
        run: |
          gradle wrapper --gradle-version=8.9
          chmod +x ./gradlew
          ls -la ./gradlew
          echo "✅ Gradlew 8.9 generated"

      - name: Verify Gradle Version
        run: ./gradlew --version

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Find Debug APK
        id: find_apk
        run: |
          APK_PATH=$(find . -path "*/build/outputs/apk/debug/*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ Debug APK not found"
            exit 1
          fi
          echo "✅ Debug APK found: $APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT

      - name: Display APK Info
        run: |
          echo "### Debug APK Build Complete ✅"
          echo "- **Gradle Version**: 8.9"
          echo "- **Path**: ${{ steps.find_apk.outputs.apk_path }}"
          echo "- **Size**: ${{ steps.find_apk.outputs.apk_size }}"
          ls -lh "${{ steps.find_apk.outputs.apk_path }}"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 7
